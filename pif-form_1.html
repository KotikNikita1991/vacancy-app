var API_URL = 'https://script.google.com/macros/s/AKfycbzcN4SA9Sz3SOof4Th8FYcKARr92mt4NLt0LrpLx-jqxZa-ULbUHFkpg1hAgpqvk5v_BA/exec';
var API_TIMEOUT_MS = 120000;

async function callApi(action, data) {
  var ctrl = new AbortController();
  var t = setTimeout(function(){ try{ ctrl.abort(); }catch(e){} }, API_TIMEOUT_MS);
  try {
    var r = await fetch(API_URL, {
      method: 'POST',
      redirect: 'follow',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(Object.assign({ action: action }, data || {})),
      signal: ctrl.signal
    });
    clearTimeout(t);
    var txt = await r.text();
    try { return JSON.parse(txt); } catch(_) { return { ok: false, error: 'Некорректный ответ сервера' }; }
  } catch(e) {
    clearTimeout(t);
    return { ok: false, error: e && e.name === 'AbortError' ? 'Превышено время ожидания. Проверьте интернет.' : (e && e.message || 'Ошибка соединения') };
  }
}

// ── Shuffle с детерминированным seed (по токену) ──────────────
function seededShuffle(arr, seed) {
  var a = arr.slice(), s = seed | 1;
  for (var i = a.length - 1; i > 0; i--) {
    s = ((Math.imul ? Math.imul(1664525, s) : (1664525 * s)) + 1013904223) | 0;
    var j = Math.abs(s) % (i + 1), tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}
function tokenSeed(token) {
  var h = 0;
  for (var i = 0; i < (token || '').length; i++)
    h = (((Math.imul ? Math.imul(31, h) : (31 * h)) | 0) + token.charCodeAt(i)) | 0;
  return Math.abs(h) || 1;
}

// ── LocalStorage progress ─────────────────────────────────────
function loadProgress(token) { try { var r = localStorage.getItem('pif_prog_' + token); return r ? JSON.parse(r) : null; } catch(e) { return null; } }
function saveProgress(token, answers) { try { localStorage.setItem('pif_prog_' + token, JSON.stringify({ answers: answers, ts: Date.now() })); } catch(e) {} }
function clearProgress(token) { try { localStorage.removeItem('pif_prog_' + token); } catch(e) {} }

function escH(s) { return s == null ? '' : String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

var OPTS_LABELS = ['Совершенно не подходит', 'Скорее не подходит', 'Скорее подходит', 'Полностью подходит'];

// ── Main init ─────────────────────────────────────────────────
(async function init() {
  var pg = document.getElementById('pif-form-pg');
  var qs; try { qs = new URLSearchParams(location.search); } catch(e) { showErr(pg, 'Ошибка инициализации'); return; }
  var token = qs.get('pif_token');
  if (!token) { showMsg(pg, 'err', '⚠', 'Ссылка недействительна', 'Отсутствует токен опроса. Проверьте ссылку из письма.'); return; }

  var res = await callApi('startPifSurvey', { token: token });
  if (!res || !res.ok) {
    if (res && res.already_done) {
      showMsg(pg, 'ok', '✓', 'Опрос уже завершён', 'Вы уже прошли этот опрос. Спасибо за участие!');
    } else {
      showMsg(pg, 'err', '⚠', 'Ссылка недействительна', res && res.error ? escH(res.error) : 'Проверьте правильность ссылки.');
    }
    return;
  }

  var inv = res.invite || {};
  var seed = tokenSeed(token);
  var saved = loadProgress(token);
  var answers = (saved && saved.answers) ? saved.answers : {};
  var shuffled = seededShuffle(PIF_QUESTIONS, seed);

  renderForm(pg, token, inv, shuffled, answers);
})();

function renderForm(pg, token, inv, questions, answers) {
  var total = questions.length;
  var answered = Object.keys(answers).length;
  var pct = Math.round(answered / total * 100);

  var qCards = questions.map(function(q, idx) {
    var cur = answers[q.n] || 0;
    var opts = OPTS_LABELS.map(function(lbl, vi) {
      var v = vi + 1;
      var sel = cur === v ? ' pif-opt--sel' : '';
      return '<label class="pif-opt' + sel + '">' +
        '<input type="radio" name="q' + q.n + '" value="' + v + '"' + (cur === v ? ' checked' : '') + '>' +
        '<span class="pif-opt-num">' + v + '</span>' +
        '<span>' + escH(lbl) + '</span>' +
        '</label>';
    }).join('');
    var done = cur > 0 ? ' pif-qcard--done' : '';
    return '<div class="pif-qcard' + done + '" id="pq' + q.n + '">' +
      '<div class="pif-qnum">' + (idx + 1) + '</div>' +
      '<div class="pif-qbody">' +
        '<div class="pif-qtext">' + escH(q.text) + '</div>' +
        '<div class="pif-opts">' + opts + '</div>' +
      '</div>' +
    '</div>';
  }).join('');

  pg.innerHTML =
    '<div class="pif-form-wrap">' +
      '<div class="pif-form-hdr">' +
        '<div class="pif-form-logo-ico">PiF</div>' +
        '<div>' +
          '<div class="pif-form-title">Оценка потенциала — PiF-Q</div>' +
          '<div class="pif-form-sub">' + escH(inv.candidate_name || '') + (inv.department ? ' · ' + escH(inv.department) : '') + '</div>' +
        '</div>' +
      '</div>' +
      '<div class="pif-form-progress">' +
        '<div class="pif-progress-bar"><div class="pif-progress-fill" id="pif-pfill" style="width:' + pct + '%"></div></div>' +
        '<div class="pif-progress-cnt" id="pif-pcnt">' + answered + ' / ' + total + '</div>' +
      '</div>' +
      '<div class="pif-scale-legend">Шкала: <b>1</b> = Совершенно не подходит &nbsp;&nbsp; <b>2</b> = Скорее не подходит &nbsp;&nbsp; <b>3</b> = Скорее подходит &nbsp;&nbsp; <b>4</b> = Полностью подходит</div>' +
      qCards +
      '<div class="pif-form-footer">' +
        '<div id="pif-sub-err" class="pif-sub-err" style="display:none"></div>' +
        '<button type="button" class="pif-submit-btn" id="pif-submit-btn">Отправить результаты</button>' +
      '</div>' +
    '</div>';

  // Radio change
  pg.addEventListener('change', function(e) {
    var inp = e.target;
    if (!inp || inp.type !== 'radio') return;
    var qn = parseInt(inp.name.replace('q', ''), 10);
    var v = parseInt(inp.value, 10);
    answers[qn] = v;
    saveProgress(token, answers);

    var card = document.getElementById('pq' + qn);
    if (card) card.classList.add('pif-qcard--done');

    var optContainer = inp.closest('.pif-opts');
    if (optContainer) {
      optContainer.querySelectorAll('.pif-opt').forEach(function(lb) {
        lb.classList.toggle('pif-opt--sel', lb.querySelector('input') === inp);
      });
    }

    var ans2 = Object.keys(answers).length;
    var pct2 = Math.round(ans2 / total * 100);
    var fill = document.getElementById('pif-pfill');
    var cnt = document.getElementById('pif-pcnt');
    if (fill) fill.style.width = pct2 + '%';
    if (cnt) cnt.textContent = ans2 + ' / ' + total;
  });

  // Submit
  var btn = document.getElementById('pif-submit-btn');
  if (btn) btn.addEventListener('click', function() {
    submitForm(token, answers, total, btn, pg);
  });
}

async function submitForm(token, answers, total, btn, pg) {
  var errEl = document.getElementById('pif-sub-err');
  var answered = Object.keys(answers).length;
  if (answered < total) {
    if (errEl) { errEl.style.display = ''; errEl.textContent = 'Пожалуйста, ответьте на все ' + total + ' утверждений. Осталось: ' + (total - answered) + '.'; }
    return;
  }
  if (errEl) errEl.style.display = 'none';
  if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spin"></span> Отправляем…'; }

  var res = await callApi('submitPifSurvey', { token: token, answers: answers });
  if (res && res.ok) {
    clearProgress(token);
    showMsg(pg, 'ok', '✓', 'Готово! Спасибо за участие.', 'Ваши ответы успешно сохранены.<br>Специалист по подбору свяжется с вами при необходимости.');
  } else {
    if (btn) { btn.disabled = false; btn.textContent = 'Отправить результаты'; }
    if (errEl) { errEl.style.display = ''; errEl.textContent = (res && res.error) || 'Не удалось отправить ответы. Попробуйте ещё раз.'; }
  }
}

function showMsg(pg, type, ico, title, body) {
  pg.innerHTML = '<div class="pif-pg-msg pif-pg-msg--' + type + '">' +
    '<div class="pif-pg-ico">' + ico + '</div>' +
    '<h2>' + escH(title) + '</h2>' +
    '<p>' + body + '</p>' +
  '</div>';
}
</script>
</body>
</html>
