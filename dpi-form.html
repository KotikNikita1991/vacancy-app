// ── API ─────────────────────────────────────────────────────────
// URL веб-приложения Google Apps Script (обновите при смене деплоя)
var API_URL = 'https://script.google.com/macros/s/AKfycbwhx_VrOP6BCsoxeDyfxzGyDLP0vlDSXsb2pQYMaP0vWvzcD0ZO9dB4P89rWBdV5_VhXw/exec';
var API_TIMEOUT_MS = 120000;

async function callApi(action, data) {
  var ctrl = new AbortController();
  var t = setTimeout(function(){ try{ ctrl.abort(); }catch(e){} }, API_TIMEOUT_MS);
  try {
    var r = await fetch(API_URL, {
      method: 'POST',
      redirect: 'follow',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(Object.assign({ action: action }, data || {})),
      signal: ctrl.signal
    });
    clearTimeout(t);
    if (!r.ok) return { ok: false, error: 'HTTP ' + r.status };
    var text = await r.text();
    try { return JSON.parse(text); }
    catch(e) { return { ok: false, error: text.slice(0, 200) }; }
  } catch(e) {
    clearTimeout(t);
    return { ok: false, error: e && e.name === 'AbortError' ? 'Таймаут запроса — попробуйте снова' : String(e && (e.message || e) || e) };
  }
}

// ── HELPERS ──────────────────────────────────────────────────────
function escH(s) {
  if (s == null || s === '') return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function seededShuffle(arr, seed) {
  var a = arr.slice(), s = seed | 1;
  for (var i = a.length - 1; i > 0; i--) {
    s = ((Math.imul ? Math.imul(1664525, s) : (1664525 * s)) + 1013904223) | 0;
    var j = Math.abs(s) % (i + 1), tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}

function tokenSeed(token) {
  var h = 0;
  for (var i = 0; i < (token || '').length; i++)
    h = (((Math.imul ? Math.imul(31, h) : (31 * h)) | 0) + token.charCodeAt(i)) | 0;
  return Math.abs(h) || 1;
}

function loadProgress(token) {
  try { var r = localStorage.getItem('dpi_prog_' + token); return r ? JSON.parse(r) : null; }
  catch(e) { return null; }
}
function saveProgress(token, answers) {
  try { localStorage.setItem('dpi_prog_' + token, JSON.stringify({ answers: answers, ts: Date.now() })); }
  catch(e) {}
}
function clearProgress(token) {
  try { localStorage.removeItem('dpi_prog_' + token); }
  catch(e) {}
}

  {n:106,text:'Я всегда сразу признаю свои ошибки, никогда не пытаясь их скрыть или оправдать'},
  {n:107,text:'Мне никогда не приходило в голову преувеличить свои заслуги или вклад в общий результат'},
  {n:108,text:'Я никогда не говорил(а) о коллеге негативно за его спиной'},
  {n:109,text:'Мне всегда удаётся сохранять полное спокойствие, что бы ни происходило на работе'},
  {n:110,text:'Я никогда не откладывал(а) важные дела на потом'},
];

// ── FORM RENDERING ────────────────────────────────────────────────
var OPTS = ['Совершенно не подходит','Скорее не подходит','Скорее подходит','Полностью подходит'];

function renderDpiForm(container, token, invite, questions, answers) {
  var total = questions.length;
  var answered = Object.keys(answers).length;
  var pct = Math.round(answered / total * 100);

  var qHtml = questions.map(function(q, idx) {
    var ans = Number(answers[q.n]) || 0;
    var radios = OPTS.map(function(lbl, li) {
      var v = li + 1;
      return '<label class="dpi-opt' + (ans === v ? ' dpi-opt--sel' : '') + '">' +
        '<input type="radio" name="dq_' + q.n + '" value="' + v + '"' + (ans === v ? ' checked' : '') + ' data-qn="' + q.n + '">' +
        '<span class="dpi-opt-num">' + v + '</span>' +
        '<span class="dpi-opt-lbl">' + escH(lbl) + '</span>' +
      '</label>';
    }).join('');
    return '<div class="dpi-qcard' + (ans ? ' dpi-qcard--done' : '') + '" id="dqc_' + q.n + '">' +
      '<div class="dpi-qnum">' + (idx + 1) + '</div>' +
      '<div class="dpi-qbody">' +
        '<div class="dpi-qtext">' + escH(q.text) + '</div>' +
        '<div class="dpi-opts">' + radios + '</div>' +
      '</div>' +
    '</div>';
  }).join('');

  container.innerHTML =
    '<div class="dpi-form-wrap">' +
      '<div class="dpi-form-hdr">' +
        '<div class="dpi-form-logo-ico">ДПИ</div>' +
        '<div>' +
          '<h1 class="dpi-form-title">Опросник деструкторов (DPI-R)</h1>' +
          '<p class="dpi-form-sub">Здравствуйте, <b>' + escH(invite.candidate_name || 'участник') + '</b>! ' +
          'Ответьте честно на все ' + total + ' утверждений, опираясь на поведение на работе.</p>' +
        '</div>' +
      '</div>' +
      '<div class="dpi-form-progress">' +
        '<div class="dpi-progress-bar"><div class="dpi-progress-fill" id="dpi-pfill" style="width:' + pct + '%"></div></div>' +
        '<span class="dpi-progress-cnt" id="dpi-pcnt">' + answered + ' / ' + total + '</span>' +
      '</div>' +
      '<div class="dpi-scale-legend">' +
        OPTS.map(function(l, i) { return '<span><b>' + (i + 1) + '</b> — ' + escH(l) + '</span>'; }).join('&nbsp; ·&nbsp; ') +
      '</div>' +
      '<div id="dpi-qlist">' + qHtml + '</div>' +
      '<div class="dpi-form-footer">' +
        '<div id="dpi-sub-err" class="dpi-sub-err" style="display:none"></div>' +
        '<button type="button" class="dpi-submit-btn" id="dpi-submit-btn">Отправить ответы →</button>' +
      '</div>' +
    '</div>';

  document.getElementById('dpi-qlist').addEventListener('change', function(ev) {
    var inp = ev.target;
    if (inp.type !== 'radio') return;
    var qn = Number(inp.dataset.qn), v = Number(inp.value);
    answers[qn] = v;
    saveProgress(token, answers);
    var card = document.getElementById('dqc_' + qn);
    if (card) {
      card.classList.add('dpi-qcard--done');
      card.querySelectorAll('.dpi-opt').forEach(function(lbl) {
        lbl.classList.toggle('dpi-opt--sel', Number(lbl.querySelector('input').value) === v);
      });
    }
    var ac = Object.keys(answers).length;
    var pf = document.getElementById('dpi-pfill');
    var pc = document.getElementById('dpi-pcnt');
    if (pf) pf.style.width = Math.round(ac / total * 100) + '%';
    if (pc) pc.textContent = ac + ' / ' + total;
  });

  document.getElementById('dpi-submit-btn').addEventListener('click', function() {
    submitForm(token, answers, questions, container);
  });
}

async function submitForm(token, answers, questions, container) {
  var total = questions.length;
  var answered = Object.keys(answers).length;
  var errEl = document.getElementById('dpi-sub-err');
  if (answered < total) {
    if (errEl) {
      errEl.textContent = 'Пожалуйста, ответьте на все утверждения. Осталось: ' + (total - answered);
      errEl.style.display = '';
    }
    for (var i = 0; i < questions.length; i++) {
      if (!answers[questions[i].n]) {
        var el = document.getElementById('dqc_' + questions[i].n);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
        break;
      }
    }
    return;
  }
  var btn = document.getElementById('dpi-submit-btn');
  if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spin"></span> Отправляем…'; }
  var res = await callApi('submitDpiSurvey', { token: token, answers: answers });
  if (res && res.ok) {
    clearProgress(token);
    container.innerHTML =
      '<div class="dpi-pg-msg dpi-pg-msg--ok">' +
        '<div class="dpi-pg-ico">✓</div>' +
        '<h2>Опрос завершён!</h2>' +
        '<p>Ваши ответы успешно сохранены. Спасибо за участие!</p>' +
      '</div>';
  } else {
    if (btn) { btn.disabled = false; btn.innerHTML = 'Отправить ответы →'; }
    if (errEl) {
      errEl.textContent = (res && res.error) || 'Не удалось отправить. Попробуйте снова.';
      errEl.style.display = '';
    }
  }
}

// ── INIT ─────────────────────────────────────────────────────────
async function init() {
  var container = document.getElementById('dpi-form-pg');
  var qs;
  try { qs = new URLSearchParams(location.search); } catch(e) { qs = { get: function(){ return null; } }; }
  var token = qs.get('dpi_token');

  if (!token) {
    container.innerHTML =
      '<div class="dpi-pg-msg dpi-pg-msg--err">' +
        '<div class="dpi-pg-ico">⚠</div>' +
        '<h2>Ссылка недействительна</h2>' +
        '<p>Токен не найден. Пожалуйста, перейдите по ссылке из письма.<br>Если проблема повторяется, обратитесь к специалисту по подбору персонала.</p>' +
      '</div>';
    return;
  }

  container.innerHTML = '<div class="dpi-pg-loading"><span class="spin"></span> Загружаем опрос…</div>';

  var res = await callApi('startDpiSurvey', { token: token });
  if (!res || !res.ok) {
    if (res && res.already_done) {
      container.innerHTML =
        '<div class="dpi-pg-msg dpi-pg-msg--ok">' +
          '<div class="dpi-pg-ico">✓</div>' +
          '<h2>Опрос уже завершён</h2>' +
          '<p>Ваши ответы были успешно сохранены ранее. Спасибо за участие!</p>' +
        '</div>';
    } else {
      container.innerHTML =
        '<div class="dpi-pg-msg dpi-pg-msg--err">' +
          '<div class="dpi-pg-ico">⚠</div>' +
          '<h2>' + escH(res && res.error ? res.error : 'Ссылка недействительна') + '</h2>' +
          '<p>Обратитесь к специалисту по подбору персонала.</p>' +
        '</div>';
    }
    return;
  }

  var invite = res.invite;
  var allQ = DPI_QUESTIONS.concat(DPI_IM_QUESTIONS.map(function(q) { return { n: q.n, text: q.text }; }));
  var questions = seededShuffle(allQ, tokenSeed(token));
  var saved = loadProgress(token);
  var answers = saved ? saved.answers : {};
  renderDpiForm(container, token, invite, questions, answers);
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
