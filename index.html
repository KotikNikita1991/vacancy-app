<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Проект «Вакансия»</title>
<link href="https://fonts.googleapis.com/css2?family=Onest:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/app.css">
</head>

<body>
<div id="ls">
  <div class="lb">
    <div class="ll">
      <div class="ll-ico">В</div>
      <h1>Проект «Вакансия»</h1>
      <p>Система управления подбором персонала</p>
    </div>
    <div class="lf">
      <form onsubmit="return false">
        <label class="llbl">Логин</label>
        <input id="il" class="linp" placeholder="Введите логин" autocomplete="username">
        <label class="llbl">Пароль</label>
        <input id="ip" class="linp" type="password" placeholder="Введите пароль" autocomplete="current-password">
        <div id="lerr" class="lerr" style="display:none"></div>
        <button id="lbtn" class="lbtn">Войти →</button>
      </form>
      <div class="l-adv api-url-row" id="api-url-wrap">
        <div class="l-adv-t">Подключение к API</div>
        <div class="api-url-row-inner">
          <input id="api-url-ov" class="linp" type="url" placeholder="https://script.google.com/.../exec" autocomplete="off">
          <button type="button" id="api-url-save" class="lbtn secondary">Сохранить URL</button>
        </div>
      </div>
    </div>
    <div class="lhint">
      <div class="lht">Демо-доступ — пароль: 123</div>
      <div id="du"></div>
    </div>
  </div>
</div>

<div id="app" style="display:none">
  <div id="sidebar">
    <div class="sb-logo">
      <div class="sb-icon">В</div>
      <span class="sb-title sb-col-hide">Вакансия</span>
    </div>
    <nav id="nav"></nav>
    <div class="sb-usr">
      <div class="sb-usr-in">
        <div class="sb-av" id="sbav"></div>
        <div class="sb-usr-info sb-col-hide">
          <div class="sb-usr-name" id="sbnm"></div>
          <div class="sb-usr-role" id="sbrl"></div>
        </div>
      </div>
    </div>
  </div>
  <div id="main">
    <div id="apibar" class="apibar">⚠ Демо-режим: Apps Script URL не настроен или недоступен</div>
    <div id="hdr">
      <button type="button" id="btn-sidebar-toggle" class="h-tog">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="currentColor">
          <rect x="2" y="3" width="14" height="2" rx="1"/>
          <rect x="2" y="8" width="14" height="2" rx="1"/>
          <rect x="2" y="13" width="14" height="2" rx="1"/>
        </svg>
      </button>
      <div class="h-ttl" id="httl">Дашборд</div>
      <div style="display:flex;align-items:center;gap:10px">
        <span style="font-size:13px;font-weight:600;color:var(--ink2)" id="hnm"></span>
        <span class="rbadge" id="hbdg"></span>
        <button type="button" id="btn-logout" class="btn-out">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Выйти
        </button>
      </div>
    </div>
    <div id="content"></div>
  </div>
</div>
<div id="toast" class="toast"></div>
<script src="js/config.js"></script>
<script src="js/util.js"></script>
<script src="js/api.js"></script>
<script src="js/data.js"></script>
<script src="js/app.js"></script>
</body></html>
